name: CI - Unit Tests

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # für .NET 10: "10.0.x"
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.fsproj
            **/*.vbproj
            **/packages.lock.json
            **/global.json

      - name: Restore
        run: dotnet restore WealthIQ.slnx

      - name: Build (Release)
        run: dotnet build WealthIQ.slnx --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test WealthIQ.slnx --configuration Release --no-build --logger "trx" --results-directory "TestResults"
      
      # Optional: Testresultate als Artefakt zum Download im Run
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults